stages:
- deploy

update-csvs:
  stage: deploy
  image: node:alpine
  timeout: 4 hours
  before_script:
  - apk add --no-cache git zip
  - npm install -g yarn
  - git config --global http.postBuffer 536870912
  - git config --global credential.helper store
  - echo "https://oauth2:${COMMUNITYDATA_TOKEN_RW}@gitlab.com" > ~/.git-credentials
  script:
  - rm -r ./csv
  - mkdir ./csv
  - yarn --cwd scripts
  - OUT=./csv node ./scripts/generate.js
  - git add -A ./csv
  - git commit --author "${GIT_COMMITTER_NAME} <${GIT_COMMITTER_EMAIL}>" -m "Update CSV $(date +%Y-%m-%d)"
#  - git push --dry-run "https://gitlab.com/coinmetrics/data-delivery/data.git" HEAD:refs/heads/master
  - git push "https://gitlab.com/coinmetrics/data-delivery/data.git" HEAD:refs/heads/master
  tags:
  - linux
  - kube-any-small
  only:
  - schedules
  - web